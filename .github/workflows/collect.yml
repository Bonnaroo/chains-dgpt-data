name: Collect DGPT Data

# When this runs:
#  - Manually, whenever you click "Run workflow" on the Actions tab
#  - Automatically every Monday at 14:00 UTC (after weekend events finish)

on:
  workflow_dispatch:
    inputs:
      event_id:
        description: "PDGA event ID to collect (leave blank to refresh all events in events.txt)"
        required: false
        default: ""
  schedule:
    # Twice daily, every day (UTC). ~7am and ~5pm US Eastern-ish.
    # Quiet days are harmless no-ops; weekends stay fresh.
    - cron: "0 12 * * *"
    - cron: "0 22 * * *"

# Allow the job to write files back into the repo
permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Collect event data
        run: |
          if [ -n "${{ github.event.inputs.event_id }}" ]; then
            echo "Collecting single event: ${{ github.event.inputs.event_id }}"
            python collect_event.py "${{ github.event.inputs.event_id }}"
          else
            echo "Refreshing all events listed in events.txt"
            while read -r id; do
              [ -z "$id" ] && continue
              case "$id" in \#*) continue ;; esac
              python collect_event.py "$id" || echo "  (skipped $id)"
            done < events.txt
          fi

      - name: Collect news headlines
        run: python collect_news.py || echo "  (news fetch skipped)"

      - name: Collect videos
        run: python collect_videos.py || echo "  (video fetch skipped)"

      - name: Collect highlights
        run: python collect_highlights.py || echo "  (highlights fetch skipped)"

      - name: Commit any new or changed data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update DGPT data $(date -u +%Y-%m-%d)"
            git push
          fi
