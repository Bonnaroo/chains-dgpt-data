name: Live Scores

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * 4,5,6,0"

permissions:
  contents: write

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Collect live scores
        run: python collect_live.py || echo " (live fetch skipped)"
      - name: Commit live data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/live.json
          if git diff --staged --quiet; then
            echo "No change."
          else
            git commit -m "Live scores update"
            git push
          fi
