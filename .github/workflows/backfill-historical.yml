name: Backfill historical events (one-time)
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Collect every scheduled event missing a stats file
        run: |
          ids=$(python -c "import json,glob; s=set();
          [s.update(str(e['event_id']) for e in json.load(open(f)).get('events',[])) for f in glob.glob('data/season*.json')];
          print(' '.join(sorted(s)))")
          for id in $ids; do
            if [ -f "data/events/${id}-MPO.json" ]; then echo "have $id"; continue; fi
            echo "=== collecting $id ==="
            python collect_event.py "$id" || echo "FAILED $id"
          done
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events
          git commit -m "Backfill historical DGPT event stats" || echo "no changes"
          git push
