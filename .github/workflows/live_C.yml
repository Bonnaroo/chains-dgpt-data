name: Live Scores C

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * 4,5,6,0"

permissions:
  contents: write

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Stagger offset (+200s)
        run: sleep 200

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pull latest first
        run: git pull origin main --no-rebase || true

      - name: Collect live scores
        run: python collect_live.py || echo "  (live fetch skipped)"

      - name: Commit and push (retry on conflict)
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/live.json
          if git diff --staged --quiet; then
            echo "No change."
            exit 0
          fi
          git commit -m "Live scores update (C)"
          # retry push up to 3 times; on conflict, regenerate fresh and retry
          for i in 1 2 3; do
            if git push; then
              echo "pushed"
              break
            fi
            echo "push failed, syncing and regenerating..."
            git reset --hard HEAD~1
            git pull origin main --no-rebase || true
            python collect_live.py || true
            git add data/live.json
            git commit -m "Live scores update (C retry $i)" || break
          done
